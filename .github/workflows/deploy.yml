name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-kasmess-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, kasmess]
    timeout-minutes: 60
    steps:
      - name: Deploy
        run: |
          set -euo pipefail
          cd "$HOME/apps/kas-mess-v2"
          # serialize deploys across ALL repos on this server (RAM protection)
          exec 9>/tmp/ci-deploy.lock
          flock 9
          echo '==> acquired global deploy lock'
          ./deploy.sh

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          status: ${{ job.status }}
          title: 'deploy › kas-mess-v2'
          description: |
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: CI/CD Bot
          avatar_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
